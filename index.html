<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNL Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" type="image/x-icon" href="assets/images/favicons/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicons/favicon-16x16.png">

  <!-- Restore the saved US/UK mode before paint to avoid a colour flash -->
  <script>document.documentElement.dataset.mode = localStorage.getItem('snl-mode') || 'us';</script>
</head>
<body>

  <!-- Header is built by site.js (single source of truth) -->
  <header id="site-header"></header>

  <main>
    <section class="hero">
      <p class="hero-eyebrow" id="hero-eyebrow"></p>
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-sub">
        Your personal hub for tracking everything you watch on SNL —
        episodes, sketches, scores &amp; more.
      </p>
    </section>

    <hr class="divider" />

    <section>
      <h2 class="section-label">Explore</h2>
      <div class="card-grid" id="home-cards"></div>
    </section>
  </main>

  <!-- Footer is built by site.js -->
  <footer id="site-footer"></footer>

  <!-- Load order matters: data, then shared site, then page script -->
  <script src="data/snl-data.js" defer></script>
  <script src="assets/js/site.js" defer></script>
  <script src="assets/js/home.js" defer></script>
</body>
</html>
